kind = "web"
previewPath = "/"
title = "Класс-Контроль"
version = "1.0.0"
id = "artifacts/classroom-control"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20891

[services.development]
run = "pnpm --filter @workspace/classroom-control run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/classroom-control", "run", "build" ]
publicDir = "artifacts/classroom-control/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20891"
BASE_PATH = "/"
